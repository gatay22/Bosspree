name: Build Plugin

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x
    - name: Build
      run: dotnet build -c Release
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyPluginDLL
        path: bin/Release/net9.0/*.dll

